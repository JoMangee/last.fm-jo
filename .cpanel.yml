---
# Copy this file to .cpanel.yml and set DEPLOYPATH to your web root.
# Example: /home/YOUR_USERNAME/public_html/lastfm
deployment:
  tasks:
    - export DEPLOYPATH=/home/YOUR_USERNAME/public_html/lastfm
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/mkdir -p $DEPLOYPATH/callback
    - /bin/mkdir -p $DEPLOYPATH/data
    - /bin/cp -R includes $DEPLOYPATH/
    - /bin/cp index.php $DEPLOYPATH/index.php
    - /bin/cp callback/index.php $DEPLOYPATH/callback/index.php
    - /bin/cp .env.example $DEPLOYPATH/.env.example
    - /bin/cp README.md $DEPLOYPATH/
    - /bin/cp data/.htaccess $DEPLOYPATH/data/.htaccess
    - /usr/bin/find $DEPLOYPATH -type d -exec chmod 755 {} \;
    - /usr/bin/find $DEPLOYPATH -type f -exec chmod 644 {} \;
    - if [ -f $DEPLOYPATH/.env ]; then chmod 600 $DEPLOYPATH/.env; fi
    - chmod 750 $DEPLOYPATH/data
    - chmod 775 $DEPLOYPATH/data
    - if [ -f $DEPLOYPATH/data/session.json ]; then chmod 600 $DEPLOYPATH/data/session.json; fi
