---
deployment:
  tasks:
    # ── Last.fm ──────────────────────────────────────────────────────────
    - export LASTFMPATH=/home2/meshnet/public_html/lastfm
    - /bin/mkdir -p $LASTFMPATH
    - /bin/mkdir -p $LASTFMPATH/callback
    - /bin/mkdir -p $LASTFMPATH/data
    - /bin/mkdir -p $LASTFMPATH/scrobble
    - /bin/cp -R includes $LASTFMPATH/
    - /bin/cp index.php $LASTFMPATH/index.php
    - /bin/cp deploy/lastfm-root.htaccess $LASTFMPATH/.htaccess
    - /bin/cp callback/index.php $LASTFMPATH/callback/index.php
    - /bin/cp scrobble/index.php $LASTFMPATH/scrobble/index.php
    - /bin/cp scrobble/.htaccess $LASTFMPATH/scrobble/.htaccess
    - /bin/cp .env.example $LASTFMPATH/.env.example
    - /bin/cp README.md $LASTFMPATH/
    - /bin/cp data/.htaccess $LASTFMPATH/data/.htaccess
    - /usr/bin/find $LASTFMPATH -type d -exec chmod 755 {} \;
    - /usr/bin/find $LASTFMPATH -type f -exec chmod 644 {} \;
    - if [ -f $LASTFMPATH/.env ]; then chmod 600 $LASTFMPATH/.env; fi
    - chmod 750 $LASTFMPATH/data
    - chmod 775 $LASTFMPATH/data
    - if [ -f $LASTFMPATH/data/session.json ]; then chmod 600 $LASTFMPATH/data/session.json; fi
    # ── Spotify ───────────────────────────────────────────────────────────
    - export SPOTIFYPATH=/home2/meshnet/public_html/spotify
    - /bin/mkdir -p $SPOTIFYPATH
    - /bin/mkdir -p $SPOTIFYPATH/callback
    - /bin/mkdir -p $SPOTIFYPATH/data
    - /bin/mkdir -p $SPOTIFYPATH/interact
    - /bin/cp -R includes $SPOTIFYPATH/
    - /bin/cp spotify/index.php $SPOTIFYPATH/index.php
    - /bin/cp spotify/status.php $SPOTIFYPATH/status.php
    - /bin/cp deploy/spotify-root.htaccess $SPOTIFYPATH/.htaccess
    - /bin/cp spotify/callback/index.php $SPOTIFYPATH/callback/index.php
    - /bin/cp spotify/interact/index.php $SPOTIFYPATH/interact/index.php
    - /bin/cp spotify/interact/.htaccess $SPOTIFYPATH/interact/.htaccess
    - /bin/cp data/.htaccess $SPOTIFYPATH/data/.htaccess
    - /usr/bin/find $SPOTIFYPATH -type d -exec chmod 755 {} \;
    - /usr/bin/find $SPOTIFYPATH -type f -exec chmod 644 {} \;
    - if [ -f $SPOTIFYPATH/.env ]; then chmod 600 $SPOTIFYPATH/.env; fi
    - chmod 750 $SPOTIFYPATH/data
    - chmod 775 $SPOTIFYPATH/data
    - if [ -f $SPOTIFYPATH/data/spotify_session.json ]; then chmod 600 $SPOTIFYPATH/data/spotify_session.json; fi
